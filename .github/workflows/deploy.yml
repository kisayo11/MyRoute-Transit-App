name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ODSAY_API_KEY: ${{ secrets.VITE_ODSAY_API_KEY }}
          VITE_SEOUL_SUBWAY_KEY: ${{ secrets.VITE_SEOUL_SUBWAY_KEY }}
          VITE_SEOUL_BUS_KEY: ${{ secrets.VITE_SEOUL_BUS_KEY }}

      - name: Sanity Check (Verification)
        run: |
          echo "Checking if index.html was generated correctly..."
          if [ ! -f dist/index.html ]; then
            echo "Error: dist/index.html not found!"
            exit 1
          fi
          
          echo "Creating 404.html for SPA routing insurance..."
          cp dist/index.html dist/404.html
          
          echo "Checking if asset paths are correctly resolved..."
          grep -q "/MyRoute-Transit-App/assets/" dist/index.html || { echo "Error: Expected asset path not found in index.html. Checking build structure..."; ls -R dist; exit 1; }
          
          if [ -f dist/.nojekyll ]; then
            echo ".nojekyll found in dist root. OK."
          else
            echo "Adding .nojekyll to dist root..."
            touch dist/.nojekyll
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
