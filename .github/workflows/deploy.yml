name: Deploy to GitHub Pages (v1.1.0)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ODSAY_API_KEY: ${{ secrets.VITE_ODSAY_API_KEY }}
          VITE_KAKAO_API_KEY: ${{ secrets.VITE_KAKAO_API_KEY }}
          VITE_PUBLIC_SUBWAY_API_KEY: ${{ secrets.VITE_PUBLIC_SUBWAY_API_KEY }}
          VITE_PUBLIC_BUS_API_KEY: ${{ secrets.VITE_PUBLIC_BUS_API_KEY }}

      - name: Preparation for Deployment
        run: |
          # [Crucial] 404 Fallback for SPA
          cp dist/index.html dist/404.html
          # [Crucial] Bypass Jekyll
          touch dist/.nojekyll
          # [Logging] Verify file structure to prevent MIME errors
          echo "Listing dist contents for verification:"
          ls -R dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
